<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:Arial; margin:0; background:#eef2f7; }

header { background:#0b3d91; color:white; padding:15px; text-align:center; }

.wrapper { max-width:1100px; margin:auto; padding:20px; }

.box { background:white; padding:15px; border-radius:10px; margin:10px; text-align:center; }

.stats { display:flex; flex-wrap:wrap; }

.chart-box { background:white; padding:20px; border-radius:10px; margin-top:10px; }

.card { background:white; padding:15px; margin-top:10px; border-radius:10px; }

button { padding:6px 10px; border:none; border-radius:5px; margin-top:5px; cursor:pointer; }
.delete { background:red; color:white; }

</style>
</head>

<body>

<header>
<h2>Dashboard Admin Imigrasi</h2>
</header>

<div class="wrapper">

<div class="stats">
<div class="box">
<h3 id="total">0</h3>
<p>Total Data</p>
</div>

<div class="box">
<h3 id="avg">0</h3>
<p>Rata-rata</p>
</div>
</div>

<div class="chart-box">
<canvas id="chartUtama"></canvas>
</div>

<div id="dataContainer"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "kritik-saran-imigrasi.firebaseapp.com",
  databaseURL: "https://kritik-saran-imigrasi-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let chart;

// LOAD DATA
db.ref("kritik_saran").on("value", snap => {

    let total = 0;
    let totalNilai = 0;

    let q1=0,q2=0,q3=0,q4=0,q5=0;

    const container = document.getElementById("dataContainer");
    container.innerHTML = "";

    snap.forEach(child => {

        let d = child.val();
        let key = child.key;

        let tgl = d.waktu ? new Date(parseInt(d.waktu)) : new Date();

        total++;

        q1+=d.q1;
        q2+=d.q2;
        q3+=d.q3;
        q4+=d.q4;
        q5+=d.q5;

        totalNilai += (d.q1+d.q2+d.q3+d.q4+d.q5)/5;

        container.innerHTML += `
        <div class="card">
        <b>${d.nama}</b><br>
        ${tgl.toLocaleDateString('id-ID')}<br>
        ⭐ ${d.q1} ${d.q2} ${d.q3} ${d.q4} ${d.q5}<br>
        ${d.saran || "-"}<br>
        <button class="delete" onclick="hapus('${key}')">Hapus</button>
        </div>`;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("avg").innerText = total ? (totalNilai/total).toFixed(1) : 0;

    if(total === 0){
        updateChart([0,0,0,0,0]);
        return;
    }

    updateChart([
        q1/total,
        q2/total,
        q3/total,
        q4/total,
        q5/total
    ]);
});

// CHART
function updateChart(data){

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chartUtama"), {
        type: 'bar',
        data: {
            labels: ['Pelayanan','Kecepatan','Kemudahan','Informasi','Kepuasan'],
            datasets: [{
                label: 'Rata-rata',
                data: data
            }]
        }
    });
}

// HAPUS
function hapus(id){
    if(confirm("Hapus data?")){
        db.ref("kritik_saran/"+id).remove();
    }
}

</script>

</body>
</html>
