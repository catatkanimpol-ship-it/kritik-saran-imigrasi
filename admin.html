<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #eef2f7;
}

header {
    background: #0b3d91;
    padding: 15px;
}

.logo-group {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.logo { width: 40px; }

.title {
    color: white;
    font-size: 16px;
    font-weight: 600;
}

.wrapper {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

h2 {
    text-align: center;
    color: #0b3d91;
}

/* FILTER */
.filter-box {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

input, select {
    padding: 8px;
}

button {
    padding: 8px 12px;
    border: none;
    background: #0b3d91;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* STATS */
.stats {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.box {
    flex: 1;
    min-width: 200px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

/* CHART */
.chart-box {
    background: white;
    padding: 20px;
    margin-top: 15px;
    border-radius: 10px;
}

/* DATA */
.card {
    background: white;
    padding: 15px;
    margin-top: 10px;
    border-radius: 10px;
}

.star { color: #d4af37; }

.delete-btn {
    background: red;
    color: white;
    border: none;
    padding: 6px;
    border-radius: 5px;
    margin-top: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <div class="logo-group">
        <img src="kemenkumham.png" class="logo">
        <div class="title">Dashboard Admin Imigrasi</div>
        <img src="imigrasi.png" class="logo">
    </div>
</header>

<div class="wrapper">

<h2>Laporan Kritik & Saran</h2>

<div class="filter-box">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    
    <select id="bulan">
        <option value="">Semua Bulan</option>
        <option value="0">Januari</option>
        <option value="1">Februari</option>
        <option value="2">Maret</option>
        <option value="3">April</option>
        <option value="4">Mei</option>
        <option value="5">Juni</option>
        <option value="6">Juli</option>
        <option value="7">Agustus</option>
        <option value="8">September</option>
        <option value="9">Oktober</option>
        <option value="10">November</option>
        <option value="11">Desember</option>
    </select>

    <button onclick="applyFilter()">Filter</button>
    <button onclick="exportExcel()">Export Excel</button>
</div>

<div class="stats">
    <div class="box">
        <h3 id="total">0</h3>
        <p>Total Data</p>
    </div>
    <div class="box">
        <h3 id="avg">0</h3>
        <p>Rata-rata</p>
    </div>
</div>

<div class="chart-box">
    <canvas id="barChart"></canvas>
</div>

<div id="dataContainer"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBd3i2vUcMEl8xY0JAE9lMPBtORqT7__Uc",
  authDomain: "kritik-saran-imigrasi.firebaseapp.com",
  databaseURL: "https://kritik-saran-imigrasi-default-rtdb.firebaseio.com",
  projectId: "kritik-saran-imigrasi"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allData = [];
let filteredData = [];
let keys = [];
let chart;

// LOAD DATA
db.ref("kritik_saran").on("value", snap=>{
    allData = [];
    keys = [];
    snap.forEach(child=>{
        allData.push(child.val());
        keys.push(child.key);
    });
    renderData(allData);
});

// FILTER
function applyFilter(){
    let start = startDate.value ? new Date(startDate.value) : null;
    let end = endDate.value ? new Date(endDate.value) : null;
    let bulanVal = bulan.value;

    filteredData = [];

    allData.forEach((d,i)=>{
        let tgl = d.waktu ? new Date(parseInt(d.waktu)) : new Date();

        if(start && tgl < start) return;
        if(end && tgl > end) return;
        if(bulanVal !== "" && tgl.getMonth() != bulanVal) return;

        filteredData.push({...d, key: keys[i]});
    });

    renderData(filteredData);
}

// RENDER
function renderData(data){

    let total=0,totalNilai=0;
    let q1=0,q2=0,q3=0,q4=0,q5=0;

    const container = document.getElementById("dataContainer");
    container.innerHTML="";

    data.forEach((d, index)=>{

        let tgl = d.waktu ? new Date(parseInt(d.waktu)) : new Date();

        total++;

        q1+=d.q1;
        q2+=d.q2;
        q3+=d.q3;
        q4+=d.q4;
        q5+=d.q5;

        totalNilai += (d.q1+d.q2+d.q3+d.q4+d.q5)/5;

        container.innerHTML += `
        <div class="card">
        <b>${d.nama}</b><br>
        <small>No HP: ${d.hp || "-"}</small><br>
        <small>${tgl.toLocaleDateString('id-ID')}</small><br><br>

        ⭐ ${d.q1} ${d.q2} ${d.q3} ${d.q4} ${d.q5}<br><br>

        <b>Saran:</b><br>${d.saran || "-"}<br>

        <button class="delete-btn" onclick="hapusData('${d.key || keys[index]}')">
        Hapus
        </button>
        </div>`;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("avg").innerText = total ? (totalNilai/total).toFixed(1) : 0;

    if(total === 0){
        updateChart([0,0,0,0,0]);
        return;
    }

    updateChart([q1/total,q2/total,q3/total,q4/total,q5/total]);
}

// CHART
function updateChart(data){
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("barChart"), {
        type:'bar',
        data:{
            labels:['Pelayanan','Kecepatan','Kemudahan','Informasi','Kepuasan'],
            datasets:[{
                label:'Rata-rata',
                data:data
            }]
        }
    });
}

// HAPUS
function hapusData(id){
    if(confirm("Yakin hapus data?")){
        db.ref("kritik_saran/"+id).remove();
    }
}

// EXPORT
function exportExcel(){
    let data = filteredData.length ? filteredData : allData;

    let csv = [];
    csv.push(["No","Nama","No HP","Tanggal","Q1","Q2","Q3","Q4","Q5","Rata-rata","Saran"]);

    data.forEach((d,i)=>{
        let rata = ((d.q1+d.q2+d.q3+d.q4+d.q5)/5).toFixed(1);
        let tgl = d.waktu ? new Date(parseInt(d.waktu)).toLocaleString('id-ID') : "-";

        csv.push([
            i+1,
            d.nama,
            d.hp,
            tgl,
            d.q1,
            d.q2,
            d.q3,
            d.q4,
            d.q5,
            rata,
            `"${d.saran || "-"}"`
        ]);
    });

    let csvContent = csv.map(e => e.join(",")).join("\n");

    let blob = new Blob([csvContent], { type: 'text/csv' });

    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "laporan_kritik_saran.csv";
    link.click();
}
</script>

</body>
</html>
