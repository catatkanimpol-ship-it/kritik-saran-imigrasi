<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Super Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:'Segoe UI'; margin:0; background:#eef2f7; }

header { background:#0b3d91; padding:15px; text-align:center; color:white; }

.wrapper { max-width:1200px; margin:auto; padding:20px; }

input, select, button {
    padding:8px; margin:5px; border-radius:6px; border:1px solid #ccc;
}

button { background:#0b3d91; color:white; cursor:pointer; }

.stats { display:flex; gap:10px; flex-wrap:wrap; }
.box { flex:1; background:white; padding:15px; border-radius:10px; text-align:center; }

.chart-box { background:white; padding:20px; margin-top:15px; border-radius:10px; }

.card {
    background:white;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
}

.star { color:#d4af37; }

.actions button {
    margin-right:5px;
    padding:5px 8px;
    border:none;
    border-radius:5px;
}

.delete { background:red; color:white; }
.edit { background:orange; color:white; }
.save { background:green; color:white; }

</style>
</head>

<body>

<header>
<h2>Dashboard Admin Imigrasi</h2>
</header>

<div class="wrapper">

<!-- FILTER -->
<input type="text" id="search" placeholder="Cari nama...">

<input type="date" id="startDate">
<input type="date" id="endDate">

<select id="bulan">
<option value="">Semua Bulan</option>
<option value="0">Jan</option>
<option value="1">Feb</option>
<option value="2">Mar</option>
<option value="3">Apr</option>
<option value="4">Mei</option>
<option value="5">Jun</option>
<option value="6">Jul</option>
<option value="7">Agu</option>
<option value="8">Sep</option>
<option value="9">Okt</option>
<option value="10">Nov</option>
<option value="11">Des</option>
</select>

<button onclick="applyFilter()">Filter</button>
<button onclick="exportExcel()">Export Excel</button>

<!-- STATS -->
<div class="stats">
<div class="box"><h3 id="total">0</h3>Total</div>
<div class="box"><h3 id="avg">0</h3>Rata-rata</div>
</div>

<!-- CHART -->
<div class="chart-box"><canvas id="chartUtama"></canvas></div>
<div class="chart-box"><canvas id="chartBulanan"></canvas></div>

<!-- DATA -->
<div id="dataContainer"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "kritik-saran-imigrasi.firebaseapp.com",
  databaseURL: "https://kritik-saran-imigrasi-default-rtdb.firebaseio.com",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allData=[], filteredData=[], chart1, chart2;

// LOAD DATA
db.ref("kritik_saran").on("value", snap=>{
    allData=[];
    snap.forEach(c=>{
        allData.push({...c.val(), key:c.key});
    });
    renderData(allData);
});

// FILTER
function applyFilter(){
    let searchVal = search.value.toLowerCase();
    let start = startDate.value ? new Date(startDate.value) : null;
    let end = endDate.value ? new Date(endDate.value) : null;
    let bulanVal = bulan.value;

    filteredData = allData.filter(d=>{
        let tgl = new Date(parseInt(d.waktu));

        if(searchVal && !d.nama.toLowerCase().includes(searchVal)) return false;
        if(start && tgl < start) return false;
        if(end && tgl > end) return false;
        if(bulanVal !== "" && tgl.getMonth()!=bulanVal) return false;

        return true;
    });

    renderData(filteredData);
}

// RENDER
function renderData(data){

    let total=0,totalNilai=0;
    let q=[0,0,0,0,0];
    let bulanCount = Array(12).fill(0);

    const container = document.getElementById("dataContainer");
    container.innerHTML="";

    data.forEach(d=>{
        let tgl = new Date(parseInt(d.waktu));

        total++;
        q[0]+=d.q1; q[1]+=d.q2; q[2]+=d.q3; q[3]+=d.q4; q[4]+=d.q5;

        bulanCount[tgl.getMonth()]++;

        totalNilai += (d.q1+d.q2+d.q3+d.q4+d.q5)/5;

        container.innerHTML += `
        <div class="card">
        <b>${d.nama}</b><br>
        ${tgl.toLocaleDateString('id-ID')}<br>
        ⭐ ${d.q1} ${d.q2} ${d.q3} ${d.q4} ${d.q5}<br>
        ${d.saran}<br>

        <div class="actions">
        <button class="delete" onclick="hapus('${d.key}')">Hapus</button>
        <button class="edit" onclick="edit('${d.key}')">Edit</button>
        </div>
        </div>`;
    });

    totalEl.innerText=total;
    avgEl.innerText= total ? (totalNilai/total).toFixed(1):0;

    // CHART UTAMA
    updateChartUtama(q.map(x=> total? x/total:0));

    // CHART BULANAN
    updateChartBulanan(bulanCount);
}

// CHART UTAMA
function updateChartUtama(data){
    if(chart1) chart1.destroy();
    chart1 = new Chart(chartUtama,{
        type:'bar',
        data:{
            labels:['Pelayanan','Kecepatan','Kemudahan','Informasi','Kepuasan'],
            datasets:[{data:data}]
        }
    });
}

// CHART BULANAN
function updateChartBulanan(data){
    if(chart2) chart2.destroy();
    chart2 = new Chart(chartBulanan,{
        type:'line',
        data:{
            labels:['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'],
            datasets:[{data:data}]
        }
    });
}

// HAPUS
function hapus(id){
    if(confirm("Hapus data?")){
        db.ref("kritik_saran/"+id).remove();
    }
}

// EDIT
function edit(id){
    let nama = prompt("Edit nama:");
    if(nama){
        db.ref("kritik_saran/"+id).update({nama});
    }
}

// EXPORT
function exportExcel(){
    let data = filteredData.length ? filteredData : allData;

    let csv="Nama,Tanggal,Q1,Q2,Q3,Q4,Q5,Saran\n";

    data.forEach(d=>{
        csv+=`${d.nama},${new Date(parseInt(d.waktu)).toLocaleString('id-ID')},${d.q1},${d.q2},${d.q3},${d.q4},${d.q5},"${d.saran}"\n`;
    });

    let blob = new Blob([csv]);
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="laporan.csv";
    a.click();
}
</script>

</body>
</html>
