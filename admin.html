<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #eef2f7;
}

header {
    background: #0b3d91;
    padding: 15px;
}

.logo-group {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.logo { width: 40px; }

.title {
    color: white;
    font-size: 16px;
    font-weight: 600;
}

.wrapper {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

h2 {
    text-align: center;
    color: #0b3d91;
}

/* FILTER */
.filter-box {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

input, select {
    padding: 8px;
}

/* BUTTON */
button {
    padding: 8px 12px;
    border: none;
    background: #0b3d91;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* STATS */
.stats {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.box {
    flex: 1;
    min-width: 200px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

/* CHART */
.chart-box {
    background: white;
    padding: 20px;
    margin-top: 15px;
    border-radius: 10px;
}

/* DATA */
.card {
    background: white;
    padding: 15px;
    margin-top: 10px;
    border-radius: 10px;
}

.star { color: #d4af37; }

@media(max-width:600px){
.filter-box { flex-direction: column; }
}
</style>
</head>

<body>

<header>
    <div class="logo-group">
        <img src="kemenkumham.png" class="logo">
        <div class="title">Dashboard Admin Imigrasi</div>
        <img src="imigrasi.png" class="logo">
    </div>
</header>

<div class="wrapper">

<h2>Laporan Kritik & Saran</h2>

<!-- FILTER -->
<div class="filter-box">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    
    <select id="bulan">
        <option value="">Semua Bulan</option>
        <option value="0">Januari</option>
        <option value="1">Februari</option>
        <option value="2">Maret</option>
        <option value="3">April</option>
        <option value="4">Mei</option>
        <option value="5">Juni</option>
        <option value="6">Juli</option>
        <option value="7">Agustus</option>
        <option value="8">September</option>
        <option value="9">Oktober</option>
        <option value="10">November</option>
        <option value="11">Desember</option>
    </select>

    <button onclick="applyFilter()">Filter</button>
    <button onclick="exportExcel()">Export Excel</button>
</div>

<!-- STATS -->
<div class="stats">
    <div class="box">
        <h3 id="total">0</h3>
        <p>Total Data</p>
    </div>
    <div class="box">
        <h3 id="avg">0</h3>
        <p>Rata-rata</p>
    </div>
</div>

<div class="chart-box">
    <canvas id="barChart"></canvas>
</div>

<div id="dataContainer"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBd3i2vUcMEl8xY0JAE9lMPBtORqT7__Uc",
  authDomain: "kritik-saran-imigrasi.firebaseapp.com",
  databaseURL: "https://kritik-saran-imigrasi-default-rtdb.firebaseio.com",
  projectId: "kritik-saran-imigrasi"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allData = [];
let filteredData = [];

db.ref("kritik_saran").on("value", snap=>{
    allData = [];
    snap.forEach(child=>{
        allData.push(child.val());
    });
    renderData(allData);
});

function applyFilter(){
    let start = new Date(startDate.value);
    let end = new Date(endDate.value);
    let bulan = bulanSelect.value;

    filteredData = allData.filter(d=>{
        let tgl = new Date(d.waktu);

        if(startDate.value && tgl < start) return false;
        if(endDate.value && tgl > end) return false;
        if(bulan !== "" && tgl.getMonth() != bulan) return false;

        return true;
    });

    renderData(filteredData);
}

function renderData(data){

    let total=0,totalNilai=0;
    let q1=0,q2=0,q3=0,q4=0,q5=0;

    const container = document.getElementById("dataContainer");
    container.innerHTML="";

    data.forEach(d=>{
        total++;

        q1+=d.q1;
        q2+=d.q2;
        q3+=d.q3;
        q4+=d.q4;
        q5+=d.q5;

        totalNilai += (d.q1+d.q2+d.q3+d.q4+d.q5)/5;

        container.innerHTML += `
        <div class="card">
        <b>${d.nama}</b><br>
        ${new Date(d.waktu).toLocaleDateString('id-ID')}<br>
        ⭐ ${d.q1} ${d.q2} ${d.q3} ${d.q4} ${d.q5}<br>
        ${d.saran}
        </div>`;
    });

    totalEl.innerText = total;
    avgEl.innerText = total ? (totalNilai/total).toFixed(1) : 0;

    updateChart([q1/total||0,q2/total||0,q3/total||0,q4/total||0,q5/total||0]);
}

let chart;
function updateChart(data){
    if(chart) chart.destroy();
    chart = new Chart(barChart,{
        type:'bar',
        data:{
            labels:['Pelayanan','Kecepatan','Kemudahan','Informasi','Kepuasan'],
            datasets:[{data:data}]
        }
    });
}

// EXPORT
function exportExcel(){
    let data = filteredData.length ? filteredData : allData;
    let csv = "Nama,Tanggal,Q1,Q2,Q3,Q4,Q5,Saran\n";

    data.forEach(d=>{
        csv += `${d.nama},${d.waktu},${d.q1},${d.q2},${d.q3},${d.q4},${d.q5},"${d.saran}"\n`;
    });

    let blob = new Blob([csv], { type: 'text/csv' });
    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "laporan.csv";
    a.click();
}
</script>

</body>
</html>
