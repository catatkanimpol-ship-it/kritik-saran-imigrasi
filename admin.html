<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin Imigrasi</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #eef2f7;
}

/* HEADER */
header {
    background: #0b3d91;
    padding: 15px;
}

.logo-group {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
}

.logo {
    width: 45px;
}

.title {
    color: white;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
}

/* CONTAINER */
.wrapper {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

/* STATS */
.stats {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.box {
    flex: 1;
    min-width: 200px;
    background: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* CHART */
.chart-box {
    background: white;
    padding: 20px;
    margin-top: 20px;
    border-radius: 12px;
}

/* DATA CARD */
.card {
    background: white;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.star {
    color: #d4af37;
}

/* BUTTON */
.delete-btn {
    background: red;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    margin-top: 10px;
    cursor: pointer;
}

/* RESPONSIVE */
@media(max-width:600px){
    .stats {
        flex-direction: column;
    }
    .logo {
        width: 35px;
    }
    .title {
        font-size: 14px;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo-group">
        <img src="kemenkumham.png" class="logo">
        <div class="title">Dashboard Admin Imigrasi Polonia</div>
        <img src="imigrasi.png" class="logo">
    </div>
</header>

<div class="wrapper">

<!-- STAT -->
<div class="stats">
    <div class="box">
        <h3 id="total">0</h3>
        <p>Total Data</p>
    </div>

    <div class="box">
        <h3 id="avg">0</h3>
        <p>Rata-rata Kepuasan</p>
    </div>
</div>

<!-- CHART -->
<div class="chart-box">
    <canvas id="chartUtama"></canvas>
</div>

<!-- DATA -->
<div id="dataContainer"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// CONFIG FIREBASE (WAJIB ASLI)
const firebaseConfig = {
  apiKey: "AIzaSyBd3i2vUcMEl8xY0JAE9lMPBtORqT7__Uc",
  authDomain: "kritik-saran-imigrasi.firebaseapp.com",
  databaseURL: "https://kritik-saran-imigrasi-default-rtdb.firebaseio.com",
  projectId: "kritik-saran-imigrasi"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let chart;

// LOAD DATA
db.ref("kritik_saran").on("value", snapshot => {

    let total = 0;
    let totalNilai = 0;

    let q1=0,q2=0,q3=0,q4=0,q5=0;

    const container = document.getElementById("dataContainer");
    container.innerHTML = "";

    snapshot.forEach(child => {

        const d = child.val();
        const key = child.key;

        let tanggal = d.waktu ? new Date(parseInt(d.waktu)) : Date.now();

        total++;

        q1+=d.q1 || 0;
        q2+=d.q2 || 0;
        q3+=d.q3 || 0;
        q4+=d.q4 || 0;
        q5+=d.q5 || 0;

        totalNilai += ((d.q1||0)+(d.q2||0)+(d.q3||0)+(d.q4||0)+(d.q5||0))/5;

        container.innerHTML += `
        <div class="card">
            <b>${d.nama || "-"}</b><br>
            <small>No HP: ${d.hp || "-"}</small><br>
            <small>${tanggal.toLocaleDateString('id-ID')}</small><br><br>

            <span class="star">★</span> ${d.q1} ${d.q2} ${d.q3} ${d.q4} ${d.q5}<br><br>

            <b>Saran:</b><br>
            ${d.saran || "-"}<br>

            <button class="delete-btn" onclick="hapusData('${key}')">
                Hapus
            </button>
        </div>
        `;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("avg").innerText = total ? (totalNilai/total).toFixed(1) : 0;

    updateChart([
        total ? q1/total : 0,
        total ? q2/total : 0,
        total ? q3/total : 0,
        total ? q4/total : 0,
        total ? q5/total : 0
    ]);

});

// CHART
function updateChart(data){

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chartUtama"), {
        type: 'bar',
        data: {
            labels: ['Pelayanan','Kecepatan','Kemudahan','Informasi','Kepuasan'],
            datasets: [{
                label: 'Rata-rata',
                data: data
            }]
        }
    });
}

// HAPUS DATA
function hapusData(id){
    if(confirm("Yakin ingin menghapus data ini?")){
        db.ref("kritik_saran/"+id).remove();
    }
}

</script>

</body>
</html>
