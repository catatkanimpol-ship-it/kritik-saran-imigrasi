<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kritik & Saran - Imigrasi Polonia</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #eef2f7;
}

.wrapper {
    max-width: 600px;
    margin: auto;
}

/* HEADER */
header {
    background: #0b3d91;
    padding: 15px;
}

.logo-group {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.logo { width: 35px; }

.title {
    color: white;
    font-size: 14px;
    font-weight: 600;
}

/* HERO */
.hero {
    text-align: center;
    padding: 40px 15px;
    background: linear-gradient(135deg, #0b3d91, #1e5ed6);
    color: white;
}

/* FORM */
.form-section {
    background: white;
    margin: -25px 10px 20px 10px;
    padding: 20px;
    border-radius: 12px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
}

button {
    width: 100%;
    padding: 12px;
    background: #d4af37;
    color: white;
    border: none;
    margin-top: 10px;
}

/* STAR */
.stars { display: flex; gap: 5px; }
.star { font-size: 22px; color: gray; cursor: pointer; }
.star.active { color: gold; }

/* SUCCESS */
.success-box {
    display: none;
    text-align: center;
    background: #d4edda;
    color: #155724;
    padding: 20px;
    margin: 15px;
    border-radius: 10px;
}

.success-icon {
    font-size: 40px;
}
</style>

</head>
<body>

<div class="wrapper">

<header>
    <div class="logo-group">
        <img src="kemenkumham.png" class="logo">
        <div class="title">Kantor Imigrasi Kelas I TPI Polonia</div>
        <img src="imigrasi.png" class="logo">
    </div>
</header>

<section class="hero">
    <h2>Suara Anda, Perbaikan Kami</h2>
</section>

<!-- SUCCESS -->
<div class="success-box" id="successBox">
    <div class="success-icon">✅</div>
    <h3>Berhasil!</h3>
    <p>Masukan Anda telah dikirim</p>
</div>

<section class="form-section" id="formSection">

<form id="feedbackForm">

<input type="text" id="nama" placeholder="Nama" required>
<input type="text" id="hp" placeholder="No HP" required>

<label>Pelayanan</label>
<div class="stars" data-id="q1"></div>

<label>Kecepatan</label>
<div class="stars" data-id="q2"></div>

<label>Kemudahan</label>
<div class="stars" data-id="q3"></div>

<label>Informasi</label>
<div class="stars" data-id="q4"></div>

<label>Kepuasan</label>
<div class="stars" data-id="q5"></div>

<textarea id="saran" placeholder="Saran"></textarea>

<button type="submit">Kirim</button>

</form>

</section>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBd3i2vUcMEl8xY0JAE9lMPBtORqT7__Uc",
  authDomain: "kritik-saran-imigrasi.firebaseapp.com",
  databaseURL: "https://kritik-saran-imigrasi-default-rtdb.firebaseio.com",
  projectId: "kritik-saran-imigrasi"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let ratings = {q1:0,q2:0,q3:0,q4:0,q5:0};

// BINTANG
document.querySelectorAll(".stars").forEach(container=>{
    let id = container.dataset.id;

    for(let i=1;i<=5;i++){
        let star = document.createElement("span");
        star.innerHTML = "★";
        star.classList.add("star");

        star.onclick = ()=>{
            ratings[id]=i;
            container.querySelectorAll(".star").forEach((s,idx)=>{
                s.classList.toggle("active", idx<i);
            });
        };

        container.appendChild(star);
    }
});

// SUBMIT
document.getElementById("feedbackForm").onsubmit = function(e){
    e.preventDefault();

    // VALIDASI BINTANG
    for(let key in ratings){
        if(ratings[key] === 0){
            alert("Semua penilaian bintang wajib diisi!");
            return;
        }
    }

    db.ref("kritik_saran").push({
        nama: nama.value,
        hp: hp.value,
        q1: ratings.q1,
        q2: ratings.q2,
        q3: ratings.q3,
        q4: ratings.q4,
        q5: ratings.q5,
        saran: saran.value,
        waktu: new Date().toLocaleString()
    });

    // TAMPILKAN SUKSES
    document.getElementById("formSection").style.display = "none";
    document.getElementById("successBox").style.display = "block";
};
</script>

</body>
</html>
