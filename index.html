<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kritik & Saran - Imigrasi Polonia</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #f4f7fb;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #0b3d91;
    color: white;
    padding: 12px 15px;
    flex-wrap: wrap;
}

.logo-group {
    display: flex;
    align-items: center;
}

.logo-group img {
    width: 35px;
    margin-right: 8px;
}

.title h3 {
    font-size: 14px;
    margin: 0;
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
    font-size: 13px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 50px 15px;
    background: linear-gradient(135deg, #0b3d91, #1e5ed6);
    color: white;
}

.hero h1 {
    font-size: 22px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 14px;
    line-height: 1.5;
}

/* FORM */
.form-section {
    max-width: 500px;
    margin: -30px auto 20px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    color: #0b3d91;
    font-size: 18px;
}

.subtitle {
    text-align: center;
    font-size: 13px;
    color: gray;
    margin-bottom: 15px;
}

label {
    font-size: 13px;
    font-weight: 500;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 13px;
}

textarea {
    min-height: 70px;
}

button {
    width: 100%;
    padding: 12px;
    background: #d4af37;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
    font-size: 14px;
}

button:hover {
    background: #b8962e;
}

/* BINTANG */
.stars {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
}

.star {
    font-size: 22px;
    color: #ccc;
    cursor: pointer;
}

.star.active {
    color: #d4af37;
}

/* MOBILE EXTRA RAPII */
@media (max-width: 600px) {

header {
    flex-direction: column;
    text-align: center;
}

nav {
    margin-top: 8px;
}

.hero {
    padding: 40px 10px;
}

.form-section {
    margin: -20px 10px 20px 10px;
}

}
</style>

</head>
<body>

<header>
    <div class="logo-group">
        <img src="kemenkumham.png">
        <img src="imigrasi.png">
        <div class="title">
            <h3>Kantor Imigrasi Kelas I TPI Polonia</h3>
        </div>
    </div>

    <nav>
        <a href="#">Beranda</a>
        <a href="#form">Kritik & Saran</a>
    </nav>
</header>

<section class="hero">
    <h1>Suara Anda, Perbaikan Kami</h1>
    <p>Bantu kami meningkatkan kualitas pelayanan dengan menyampaikan kritik dan saran terbaik Anda</p>
</section>

<section id="form" class="form-section">

<h2>Formulir Kritik & Saran</h2>
<p class="subtitle">Masukan Anda sangat berarti bagi kami</p>

<form id="feedbackForm">

<input type="text" id="nama" placeholder="Masukkan Nama Anda" required>
<input type="text" id="hp" placeholder="Masukkan Nomor HP Anda" required>

<label>Seberapa puas pelayanan?</label>
<div class="stars" data-id="q1"></div>

<label>Kecepatan pelayanan?</label>
<div class="stars" data-id="q2"></div>

<label>Kemudahan proses?</label>
<div class="stars" data-id="q3"></div>

<label>Kejelasan informasi?</label>
<div class="stars" data-id="q4"></div>

<label>Kepuasan keseluruhan?</label>
<div class="stars" data-id="q5"></div>

<textarea id="saran" placeholder="Tulis saran Anda..."></textarea>

<button type="submit">Kirim Masukan</button>

</form>

</section>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBd3i2vUcMEl8xY0JAE9lMPBtORqT7__Uc",
  authDomain: "kritik-saran-imigrasi.firebaseapp.com",
  databaseURL: "https://kritik-saran-imigrasi-default-rtdb.firebaseio.com",
  projectId: "kritik-saran-imigrasi",
  storageBucket: "kritik-saran-imigrasi.firebasestorage.app",
  messagingSenderId: "96342418861",
  appId: "1:96342418861:web:d5e87aed6cf3a37a30ad24"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let ratings = {q1:0,q2:0,q3:0,q4:0,q5:0};

document.querySelectorAll(".stars").forEach(container => {
    const id = container.getAttribute("data-id");

    for(let i=1;i<=5;i++){
        let star = document.createElement("span");
        star.innerHTML = "★";
        star.classList.add("star");

        star.onclick = () => {
            ratings[id] = i;
            update(container, i);
        };

        container.appendChild(star);
    }
});

function update(container, value){
    container.querySelectorAll(".star").forEach((s,i)=>{
        s.classList.toggle("active", i < value);
    });
}

document.getElementById("feedbackForm").onsubmit = function(e){
    e.preventDefault();

    db.ref("kritik_saran").push({
        nama: nama.value,
        hp: hp.value,
        q1: ratings.q1,
        q2: ratings.q2,
        q3: ratings.q3,
        q4: ratings.q4,
        q5: ratings.q5,
        saran: saran.value,
        waktu: new Date().toLocaleString()
    });

    alert("Terima kasih! Masukan berhasil dikirim");
    this.reset();
};
</script>

</body>
</html>
